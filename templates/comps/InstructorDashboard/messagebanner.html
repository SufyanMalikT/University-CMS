{% for message in messages%}
    <div class="message_banner relative isolate flex items-center gap-x-6 overflow-hidden 
    {% if message.tags == 'success' %}bg-green-400
    {% elif message.tags == 'error' %}bg-red-500 
    {% else %}bg-blue-500 
    {% endif %}px-6 py-2.5 after:pointer-events-none after:absolute after:inset-x-0 after:bottom-0 after:h-px after:bg-white/10 sm:px-3.5 sm:before:flex-1">
        <br>
        <h3 class="text-white">{{message}}</h3>
    <div class="flex flex-1 justify-end">
        <button type="button" class="-m-3 p-3 focus-visible:-outline-offset-4 cursor-pointer transition hover:bg-slate-700" id="banner_close_btn">
        <span class="sr-only">Dismiss</span>
        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="size-5 text-gray-100">
            <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
        </svg>
        </button>
    </div>
    </div>

    <script>
        const message_banner = document.querySelector('.message_banner')
        const banner_close_btn = document.querySelector('#banner_close_btn')

        banner_close_btn.addEventListener('click',()=>{
            message_banner.classList.add('hidden')
        })
    </script>
{% endfor %}
